<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麥香職人手作烘焙 Artisan Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        bakery: {
                            primary: '#ea580c',
                            primaryLight: '#fed7aa',
                            bg: '#fafaf9',
                            surface: '#ffffff',
                            text: '#292524',
                            muted: '#78716c',
                            border: '#e7e5e4'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafaf9; color: #292524; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const productsData = [
            {
                id: 1,
                name: "經典米蘭水果麵包",
                description: "傳統義大利工法，天然酵母與糖漬果乾的完美融合",
                price: 1200,
                image: "https://images.unsplash.com/photo-1607920591413-4ec007e70023?w=800&q=80",
                stock: 10
            },
            {
                id: 2,
                name: "黑松露海鹽布里歐",
                description: "嚴選法國頂級奶油與義大利黑松露，口感綿密",
                price: 850,
                image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=800&q=80",
                stock: 15
            },
            {
                id: 3,
                name: "提拉米蘇風味特製可可",
                description: "醇厚咖啡香與馬斯卡彭乳酪的極致享受",
                price: 950,
                image: "https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=800&q=80",
                stock: 0
            },
            {
                id: 4,
                name: "原味經典鄉村麵包",
                description: "長時間低溫發酵，外脆內軟散發純粹麥香",
                price: 350,
                image: "https://images.unsplash.com/photo-1586444248902-2f64eddc13df?w=800&q=80",
                stock: 20
            }
        ];

        const Icons = {
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            ShoppingBag: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        };

        const Header = ({ cartItemCount, onOpenCart }) => {
            const navItems = ["首頁", "商品總覽", "品牌故事", "門市據點", "常見問題"];
            return (
                <header className="bg-white/90 backdrop-blur-md sticky top-0 z-40 w-full border-b border-bakery-border shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-20">
                            <div className="flex-1 flex lg:hidden">
                                <button className="p-2 -ml-2 text-bakery-text hover:text-bakery-primary"><Icons.Menu /></button>
                            </div>
                            <div className="flex-shrink-0 flex flex-col items-center justify-center cursor-pointer lg:flex-1 lg:items-start lg:justify-start">
                                <span className="font-serif italic font-bold text-2xl text-bakery-primary">Artisan</span>
                                <span className="text-xs tracking-[0.2em] text-bakery-muted -mt-1 font-medium">職人手作烘焙</span>
                            </div>
                            <nav className="hidden lg:flex flex-1 items-center justify-center gap-8 text-sm font-medium text-bakery-text">
                                {navItems.map((item, index) => (
                                    <a key={index} href="#" className="hover:text-bakery-primary transition-colors relative group">
                                        {item}
                                        <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-bakery-primary transition-all duration-300 group-hover:w-full"></span>
                                    </a>
                                ))}
                            </nav>
                            <div className="flex-1 flex items-center justify-end gap-4 text-bakery-text">
                                <button className="p-2 hover:text-bakery-primary transition-colors hidden sm:block"><Icons.Search /></button>
                                <button className="p-2 hover:text-bakery-primary transition-colors hidden sm:block"><Icons.User /></button>
                                <button className="p-2 hover:text-bakery-primary transition-colors relative" onClick={onOpenCart}>
                                    <Icons.ShoppingBag />
                                    {cartItemCount > 0 && (
                                        <span className="absolute top-1 right-0 bg-bakery-primary text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center transform translate-x-1/4 -translate-y-1/4 shadow-sm">
                                            {cartItemCount}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const HeroSection = () => (
            <div className="relative bg-bakery-text text-white overflow-hidden" style={{minHeight: '520px'}}>
                <img 
                    src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=1920&q=80" 
                    alt="Bakery background" 
                    className="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay"
                    onError={(e) => { e.target.style.display='none'; }}
                />
                <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 md:py-32 flex flex-col items-center text-center">
                    <p className="text-sm tracking-[0.3em] uppercase text-orange-300 mb-4 font-medium">Since 2010 · 台南職人手作</p>
                    <h1 className="text-4xl md:text-5xl lg:text-6xl font-serif font-bold mb-6 leading-tight">
                        每天早晨，為您<br/>現烤出爐
                    </h1>
                    <p className="text-lg md:text-xl text-gray-200 max-w-2xl mb-10 font-light tracking-wide">
                        嚴選天然發酵小麥與頂級進口奶油，每一口都能品嚐到烘焙職人的堅持與溫度。
                    </p>
                    <button className="bg-bakery-primary hover:bg-orange-700 text-white px-8 py-3 rounded-full font-medium transition-colors shadow-lg shadow-orange-900/20">
                        立即選購
                    </button>
                </div>
            </div>
        );

        /* 特色區塊 */
        const FeaturesSection = () => {
            const features = [
                { icon: "🌾", title: "天然發酵", desc: "48 小時低溫長時間發酵，麥香更醇厚" },
                { icon: "🧈", title: "頂級奶油", desc: "嚴選法國 AOP 認證無鹽奶油" },
                { icon: "🔥", title: "每日現烤", desc: "凌晨四點開始備料，早晨新鮮出爐" },
                { icon: "🚚", title: "低溫配送", desc: "全程冷鏈保鮮，安心到府" },
            ];
            return (
                <section className="bg-white border-b border-bakery-border">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14 grid grid-cols-2 lg:grid-cols-4 gap-8">
                        {features.map((f, i) => (
                            <div key={i} className="flex flex-col items-center text-center gap-3">
                                <span className="text-4xl">{f.icon}</span>
                                <h3 className="font-bold text-bakery-text">{f.title}</h3>
                                <p className="text-xs text-bakery-muted leading-relaxed">{f.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const ProductCard = ({ product, onAddToCart }) => {
            const isSoldOut = product.stock === 0;
            const [imgError, setImgError] = useState(false);

            const fallbackColors = ['#fed7aa','#fde68a','#d1fae5','#dbeafe'];
            const fallback = fallbackColors[product.id % fallbackColors.length];

            return (
                <div className="group flex flex-col bg-bakery-surface rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-bakery-border">
                    <div className="relative aspect-[4/3] overflow-hidden" style={{background: fallback}}>
                        {!imgError ? (
                            <img 
                                src={product.image} 
                                alt={product.name}
                                className={`w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 ${isSoldOut ? 'opacity-60 grayscale-[30%]' : ''}`}
                                onError={() => setImgError(true)}
                            />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center text-6xl">🍞</div>
                        )}
                        {isSoldOut && (
                            <div className="absolute top-4 left-4 bg-bakery-text/80 backdrop-blur-sm text-white px-3 py-1 text-xs font-bold tracking-wider rounded-full">
                                售完 SOLD OUT
                            </div>
                        )}
                    </div>
                    <div className="flex flex-col p-5 flex-grow">
                        <h3 className="text-lg font-bold text-bakery-text mb-1">{product.name}</h3>
                        <p className="text-sm text-bakery-muted line-clamp-2 min-h-[40px]">{product.description}</p>
                        <div className="mt-6 flex items-center justify-between border-t border-bakery-border pt-4">
                            <span className="text-bakery-primary font-bold text-xl">NT${product.price.toLocaleString()}</span>
                            <button 
                                onClick={() => !isSoldOut && onAddToCart(product)}
                                disabled={isSoldOut}
                                className={`flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 ${
                                    isSoldOut 
                                    ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                                    : 'bg-orange-50 text-bakery-primary hover:bg-bakery-primary hover:text-white hover:shadow-md hover:shadow-orange-200'
                                }`}
                                aria-label="加入購物車"
                            >
                                <Icons.Plus />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* 品牌故事橫幅 */
        const BrandBanner = () => (
            <section className="relative overflow-hidden bg-stone-900 text-white my-16">
                <img
                    src="https://images.unsplash.com/photo-1556909172-8c2f041fca1e?w=1600&q=80"
                    alt="麵包師傅製作"
                    className="absolute inset-0 w-full h-full object-cover opacity-30"
                    onError={(e) => { e.target.style.display='none'; }}
                />
                <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 flex flex-col md:flex-row items-center gap-10">
                    <div className="flex-1">
                        <p className="text-xs tracking-[0.3em] uppercase text-orange-300 mb-3">Our Story</p>
                        <h2 className="text-3xl md:text-4xl font-serif font-bold mb-5 leading-snug">用時間換取的<br/>那份純粹香氣</h2>
                        <p className="text-gray-300 text-sm leading-relaxed max-w-md">
                            2010 年，我們在台南巷弄間開啟第一間小店。十多年來，我們堅持不添加人工香料與防腐劑，只讓小麥、奶油與時間，說出最誠實的故事。
                        </p>
                        <button className="mt-8 px-6 py-2.5 border border-white/50 text-white rounded-full text-sm hover:bg-white hover:text-bakery-text transition-all">
                            了解品牌故事
                        </button>
                    </div>
                    <div className="flex-1 grid grid-cols-2 gap-3 w-full max-w-sm">
                        {[
                            "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&q=80",
                            "https://images.unsplash.com/photo-1517433670267-08bbd4be890f?w=400&q=80",
                            "https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=400&q=80",
                            "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=400&q=80",
                        ].map((src, i) => (
                            <div key={i} className={`overflow-hidden rounded-xl bg-stone-700 ${i === 0 ? 'row-span-2' : ''}`} style={{aspectRatio: i===0 ? '3/4' : '1/1'}}>
                                <img src={src} alt="" className="w-full h-full object-cover opacity-90 hover:opacity-100 hover:scale-105 transition-all duration-500"
                                    onError={(e) => { e.target.parentElement.style.background='#44403c'; }} />
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const CartSidebar = ({ isOpen, onClose, cartItems, onUpdateQuantity, onRemoveItem, onCheckout }) => {
            const totalAmount = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            return (
                <>
                    <div 
                        className={`fixed inset-0 bg-bakery-text/40 backdrop-blur-sm z-50 transition-opacity duration-300 ${isOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`}
                        onClick={onClose}
                    />
                    <div className={`fixed top-0 right-0 h-full w-full sm:w-[420px] bg-bakery-surface z-50 shadow-2xl transform transition-transform duration-300 ease-in-out flex flex-col ${isOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex items-center justify-between p-6 border-b border-bakery-border">
                            <h2 className="text-xl font-bold text-bakery-text flex items-center gap-2">
                                購物袋 <span className="text-sm font-normal text-bakery-muted bg-stone-100 px-2 py-0.5 rounded-full">{cartItems.length}</span>
                            </h2>
                            <button onClick={onClose} className="p-2 hover:bg-stone-100 rounded-full transition-colors text-bakery-muted"><Icons.X /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar">
                            {cartItems.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-bakery-muted space-y-4 pt-16">
                                    <div className="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center text-bakery-primary mb-2">
                                        <Icons.ShoppingBag />
                                    </div>
                                    <p className="font-medium text-bakery-text">您的購物袋目前是空的</p>
                                    <p className="text-sm">趕快挑選幾款美味的麵包吧！</p>
                                    <button onClick={onClose} className="mt-4 px-6 py-2 border border-bakery-primary text-bakery-primary rounded-full hover:bg-orange-50 transition-colors text-sm font-medium">繼續選購</button>
                                </div>
                            ) : (
                                cartItems.map(item => (
                                    <div key={item.id} className="flex gap-4">
                                        <div className="w-24 h-24 rounded-xl overflow-hidden bg-stone-100 flex-shrink-0">
                                            <img src={item.image} alt={item.name} className="w-full h-full object-cover"
                                                onError={(e) => { e.target.parentElement.innerHTML='<div class="w-full h-full flex items-center justify-center text-3xl">🍞</div>'; }} />
                                        </div>
                                        <div className="flex-1 flex flex-col">
                                            <div className="flex justify-between items-start gap-2">
                                                <h3 className="text-sm font-bold text-bakery-text leading-snug">{item.name}</h3>
                                                <button onClick={() => onRemoveItem(item.id)} className="text-bakery-muted hover:text-red-500 transition-colors p-1 -mr-1"><Icons.Trash /></button>
                                            </div>
                                            <p className="text-bakery-primary font-bold mt-1 text-sm">NT${item.price.toLocaleString()}</p>
                                            <div className="mt-auto flex items-center">
                                                <div className="flex items-center border border-bakery-border rounded-lg bg-white">
                                                    <button onClick={() => onUpdateQuantity(item.id, item.quantity - 1)} className="p-1.5 hover:bg-stone-50 text-bakery-text transition-colors rounded-l-lg" disabled={item.quantity <= 1}><Icons.Minus /></button>
                                                    <span className="w-8 text-center text-sm font-medium">{item.quantity}</span>
                                                    <button onClick={() => onUpdateQuantity(item.id, item.quantity + 1)} className="p-1.5 hover:bg-stone-50 text-bakery-text transition-colors rounded-r-lg" disabled={item.quantity >= item.stock}><Icons.Plus /></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                        {cartItems.length > 0 && (
                            <div className="p-6 border-t border-bakery-border bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-bakery-muted font-medium">訂單總計</span>
                                    <span className="text-2xl font-bold text-bakery-text">NT${totalAmount.toLocaleString()}</span>
                                </div>
                                <button onClick={onCheckout} className="w-full py-4 bg-bakery-primary text-white font-bold rounded-xl hover:bg-orange-700 transition-colors shadow-lg shadow-orange-900/10 flex justify-center items-center gap-2">
                                    安全結帳 <Icons.ShoppingBag />
                                </button>
                            </div>
                        )}
                    </div>
                </>
            );
        };

        const Toast = ({ message, isVisible }) => {
            if (!isVisible) return null;
            return (
                <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50">
                    <div className="bg-bakery-text text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-medium border border-stone-600">
                        <div className="bg-green-500/20 text-green-400 p-1 rounded-full">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <span>{message}</span>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState("");
            const [showToast, setShowToast] = useState(false);

            const notify = (msg) => {
                setToastMessage(msg);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3000);
            };

            const handleAddToCart = (product) => {
                setCart(prevCart => {
                    const existingItem = prevCart.find(item => item.id === product.id);
                    if (existingItem) {
                        if (existingItem.quantity >= product.stock) { notify("該商品已達購買上限"); return prevCart; }
                        notify(`已增加 ${product.name} 數量`);
                        return prevCart.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    notify(`已將 ${product.name} 加入購物袋`);
                    return [...prevCart, { ...product, quantity: 1 }];
                });
            };

            const handleUpdateQuantity = (id, newQuantity) => {
                setCart(prevCart => prevCart.map(item => item.id === id ? { ...item, quantity: newQuantity } : item));
            };

            const handleRemoveItem = (id) => {
                setCart(prevCart => prevCart.filter(item => item.id !== id));
            };

            const handleCheckout = () => {
                setIsCartOpen(false);
                setCart([]);
                setTimeout(() => { alert("結帳成功！感謝您對 Artisan Bakery 的支持。"); }, 400);
            };

            const cartItemCount = useMemo(() => cart.reduce((count, item) => count + item.quantity, 0), [cart]);

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Header cartItemCount={cartItemCount} onOpenCart={() => setIsCartOpen(true)} />
                    <HeroSection />
                    <FeaturesSection />

                    <main className="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 md:py-20">
                        <div className="flex items-center justify-between mb-10">
                            <div>
                                <h2 className="text-3xl font-bold text-bakery-text mb-2">精選商品</h2>
                                <p className="text-bakery-muted text-sm">探索我們引以為傲的手工烘焙系列</p>
                            </div>
                            <div className="hidden sm:flex gap-2">
                                <span className="px-4 py-1.5 bg-bakery-primary text-white text-sm font-medium rounded-full cursor-pointer">全部商品</span>
                                <span className="px-4 py-1.5 bg-white border border-bakery-border text-bakery-text hover:bg-stone-50 text-sm font-medium rounded-full cursor-pointer transition-colors">人氣熱銷</span>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-12">
                            {productsData.map(product => (
                                <ProductCard key={product.id} product={product} onAddToCart={handleAddToCart} />
                            ))}
                        </div>
                    </main>

                    <BrandBanner />

                    <footer className="bg-white border-t border-bakery-border pt-16 pb-8">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10 mb-12 text-center md:text-left">
                                <div>
                                    <div className="font-serif italic font-bold text-xl text-bakery-text mb-4">Artisan Bakery</div>
                                    <p className="text-bakery-muted text-sm leading-relaxed max-w-xs mx-auto md:mx-0">
                                        用心揉捏每一塊麵糰，用時間淬鍊每一分麥香。我們相信，好的麵包能為生活帶來純粹的快樂。
                                    </p>
                                </div>
                                <div className="flex flex-col gap-3">
                                    <h4 className="font-bold text-bakery-text mb-2">購物指南</h4>
                                    <a href="#" className="text-sm text-bakery-muted hover:text-bakery-primary transition-colors">運送政策</a>
                                    <a href="#" className="text-sm text-bakery-muted hover:text-bakery-primary transition-colors">退換貨說明</a>
                                    <a href="#" className="text-sm text-bakery-muted hover:text-bakery-primary transition-colors">常見問題</a>
                                </div>
                                <div className="flex flex-col gap-3">
                                    <h4 className="font-bold text-bakery-text mb-2">聯絡我們</h4>
                                    <p className="text-sm text-bakery-muted">service@artisanbakery.com</p>
                                    <p className="text-sm text-bakery-muted">06-1234-5678</p>
                                    <p className="text-sm text-bakery-muted">台南市中西區烘焙路 1 號</p>
                                </div>
                            </div>
                            <div className="border-t border-bakery-border pt-8 text-center text-xs text-bakery-muted">
                                <p>© 2024 Artisan Bakery. All Rights Reserved.</p>
                            </div>
                        </div>
                    </footer>

                    <CartSidebar 
                        isOpen={isCartOpen} onClose={() => setIsCartOpen(false)}
                        cartItems={cart} onUpdateQuantity={handleUpdateQuantity}
                        onRemoveItem={handleRemoveItem} onCheckout={handleCheckout}
                    />
                    <Toast message={toastMessage} isVisible={showToast} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
